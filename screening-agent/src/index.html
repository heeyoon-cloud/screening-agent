<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screening Agent — SparkLabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="app-header">
    <span class="logo">Screening Agent</span>
    <span class="version">v1.1</span>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-pane="run">심사 실행</button>
    <button class="tab" data-pane="persona">페르소나</button>
    <button class="tab" data-pane="history">히스토리</button>
  </div>

  <div id="pane-run" class="pane active">
    <div class="card">
      <div class="row-hd"><span class="sec">심사 기본 정보</span></div>
      <div class="pb"><label class="lbl">심사명</label><input type="text" id="prog-name" placeholder="예: SparkClaw 15기, TIPS 1차 심사"></div>
      <div class="g3 pb">
        <div><label class="lbl">지원 팀 수</label><input type="number" id="total-n" placeholder="32" min="1"></div>
        <div><label class="lbl">선발 목표</label><input type="number" id="select-n" placeholder="2" min="1"></div>
        <div><label class="lbl">회사 단계</label>
          <select id="stage">
            <option value="">선택</option>
            <option value="아이디어">아이디어</option>
            <option value="Pre-product">Pre-product</option>
            <option value="MVP">MVP</option>
            <option value="초기 매출">초기 매출</option>
            <option value="시리즈A 이전">시리즈A 이전</option>
          </select>
        </div>
      </div>
      <div><label class="lbl">특이사항 (선택)</label><input type="text" id="special" placeholder="딥테크 특화, 여성 창업가 우대 등"></div>
    </div>

    <div class="card">
      <div class="row-hd"><span class="sec">평가 기준</span><button class="btn-sm" id="add-cr-btn">+ 추가</button></div>
      <div id="criteria-list"></div>
      <div class="total-row">합계: <span id="total-pts">0</span>점</div>
    </div>

    <div class="card">
      <div class="sec" style="margin-bottom:6px">평가 대상 팀 정보</div>
      <div class="hint">팀별로 줄 바꿔서 입력. IR 내용 그대로 붙여넣기 가능.</div>
      <textarea id="company-data" class="mono" style="min-height:140px"
        placeholder="팀 A: 시니어 간병 매칭. 요양보호사-가족 연결. 창업자 본인 경험 기반.&#10;&#10;팀 B: B2B 영업 자동화 SaaS. ..."></textarea>
    </div>

    <button class="btn-run" id="run-btn">심사 시작 ↗</button>

    <div id="result-area" style="display:none;margin-top:1rem">
      <div class="card">
        <div class="row-hd">
          <span class="sec" id="result-title">결과</span>
          <div style="display:flex;gap:8px">
            <button class="btn-sm" id="copy-btn">복사</button>
            <button class="btn-notion" id="notion-btn" disabled>Notion 저장</button>
          </div>
        </div>
        <div class="result-box" id="result-text"></div>
        <div class="notion-status notion-ok" id="notion-status" style="display:none"></div>
      </div>
    </div>
  </div>

  <div id="pane-persona" class="pane">
    <div class="card">
      <div class="row-hd"><span class="sec">심사 철학 편집</span><button class="btn-save" id="save-persona-btn">저장</button></div>
      <div class="hint" style="margin-bottom:12px">이 내용이 매 심사마다 system prompt로 들어갑니다.</div>
      <div class="pb"><label class="lbl">나의 투자 철학</label><textarea id="p-philosophy" style="min-height:90px"></textarea></div>
      <div class="pb"><label class="lbl">내가 보는 창업가의 조건</label><textarea id="p-founder" style="min-height:70px"></textarea></div>
      <div class="pb"><label class="lbl">즉시 탈락시키는 패턴</label><textarea id="p-no" style="min-height:70px"></textarea></div>
      <div><label class="lbl">킬러 질문 스타일</label><textarea id="p-question" style="min-height:55px"></textarea></div>
    </div>

    <div class="card">
      <div class="row-hd"><span class="sec">심사 후 학습 기록</span><button class="btn-sm" id="add-learn-btn">+ 추가</button></div>
      <div class="hint">합격/불합격 이유, 놓쳤던 것을 기록할수록 페르소나가 강화됩니다.</div>
      <div class="type-row" id="type-row" style="margin-top:10px">
        <button class="type-btn on-pass" data-type="합격 이유">합격 이유</button>
        <button class="type-btn" data-type="불합격 이유">불합격 이유</button>
        <button class="type-btn" data-type="놓쳤던 것">놓쳤던 것</button>
      </div>
      <textarea id="learn-input" style="min-height:55px;margin-top:8px"
        placeholder="예: 합격 팀은 모두 창업자가 고객 인터뷰를 50명 이상 직접 했다."></textarea>
      <div id="learning-list" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <div class="sec" style="margin-bottom:8px">YC 필터 (고정)</div>
      <div class="yc-list">
        <div>왜 지금인가? — 타이밍 근거가 있는가</div>
        <div>이상하지만 말이 되는가?</div>
        <div>이 창업가가 남들이 못 본 걸 봤는가?</div>
        <div>빠르게 실패하고 pivot할 수 있는 팀인가 — 이것도 긍정 지표</div>
      </div>
    </div>
  </div>

  <div id="pane-history" class="pane">
    <div id="history-list"></div>
  </div>
</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
